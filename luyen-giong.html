<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luyện Giọng</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&family=Be+Vietnam+Pro:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --paper: #faf7f2;
      --ink: #1a1610;
      --ink-soft: #5a5245;
      --ink-faint: #b8b0a4;
      --gold: #c8963e;
      --gold-light: #e8c07a;
      --teal: #2d7a6e;
      --teal-light: #4aada0;
      --red-soft: #c44b2e;
      --shadow: rgba(26, 22, 16, 0.12);
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Be Vietnam Pro', sans-serif;
    }

    body {
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(200, 150, 62, 0.08) 0%, transparent 70%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c8963e' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    .app {
      max-width: 560px;
      margin: 0 auto;
      padding: 48px 20px 72px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── HEADER ── */
    .app-header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeDown 0.6s ease both;
    }
    .app-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 8vw, 3.2rem);
      font-weight: 900;
      color: var(--ink);
      letter-spacing: -0.01em;
      line-height: 1;
    }
    .app-title span {
      color: var(--gold);
    }
    .app-subtitle {
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-top: 8px;
    }

    /* ── CLOCK ── */
    .clock-card {
      width: 100%;
      background: var(--ink);
      border-radius: 16px;
      padding: 24px 32px;
      text-align: center;
      margin-bottom: 36px;
      box-shadow: 0 8px 32px rgba(26,22,16,0.2), 0 2px 8px rgba(26,22,16,0.1);
      animation: fadeDown 0.6s 0.1s ease both;
      position: relative;
      overflow: hidden;
    }
    .clock-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
    }
    .clock-date-line {
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: clamp(0.8rem, 2.5vw, 0.92rem);
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--gold-light);
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    .clock-time-line {
      font-family: 'IBM Plex Mono', monospace;
      font-size: clamp(2.8rem, 10vw, 4.4rem);
      font-weight: 300;
      color: #fff;
      letter-spacing: 0.04em;
      line-height: 1;
    }
    .clock-time-line .colon {
      animation: blink 1s step-end infinite;
      display: inline-block;
    }

    /* ── SECTION CARDS ── */
    .section-card {
      width: 100%;
      background: var(--paper);
      border-radius: 16px;
      padding: 28px 28px 32px;
      box-shadow: 0 4px 24px var(--shadow), 0 1px 4px rgba(26,22,16,0.06);
      margin-bottom: 20px;
      border: 1px solid rgba(200,150,62,0.15);
      animation: fadeUp 0.6s ease both;
      position: relative;
      overflow: hidden;
    }
    .section-card:nth-child(1) { animation-delay: 0.2s; }
    .section-card:nth-child(2) { animation-delay: 0.35s; }

    .section-card::after {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--card-accent);
      border-radius: 4px 0 0 4px;
    }

    .card-xi { --card-accent: var(--gold); }
    .card-doremi { --card-accent: var(--teal); }

    .section-head {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
      padding-left: 8px;
    }
    .section-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }
    .card-xi .section-icon { background: rgba(200,150,62,0.12); }
    .card-doremi .section-icon { background: rgba(45,122,110,0.1); }

    .section-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.1;
    }
    .card-xi .section-name { color: #a07020; }
    .card-doremi .section-name { color: var(--teal); }

    .section-hint {
      font-size: 0.75rem;
      color: var(--ink-faint);
      font-weight: 300;
      margin-top: 3px;
      letter-spacing: 0.02em;
    }

    /* ── TIMER DISPLAY ── */
    .timer-wrap {
      text-align: center;
      padding: 16px 0 12px;
    }
    .timer-main {
      font-family: 'IBM Plex Mono', monospace;
      font-size: clamp(3rem, 12vw, 5rem);
      font-weight: 400;
      color: var(--ink);
      letter-spacing: 0.02em;
      line-height: 1;
      transition: color 0.3s, text-shadow 0.3s;
    }
    .timer-running.card-xi .timer-main {
      color: var(--gold);
      text-shadow: 0 0 40px rgba(200,150,62,0.25);
    }
    .timer-running.card-doremi .timer-main {
      color: var(--teal);
      text-shadow: 0 0 40px rgba(45,122,110,0.2);
    }
    .timer-sub {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem;
      color: var(--ink-faint);
      margin-top: 6px;
      letter-spacing: 0.1em;
    }

    /* ── PULSE RING (when running) ── */
    .pulse-ring {
      display: none;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin: 0 auto 4px;
      animation: pulse-dot 1.2s ease-in-out infinite;
    }
    .card-xi .pulse-ring { background: var(--gold); }
    .card-doremi .pulse-ring { background: var(--teal); }
    .timer-running .pulse-ring { display: block; }

    /* ── BUTTONS ── */
    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }
    .btn {
      font-family: 'Be Vietnam Pro', sans-serif;
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      padding: 11px 0;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      flex: 1;
    }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; }

    .card-xi .btn-start {
      background: var(--gold);
      color: #fff;
    }
    .card-xi .btn-start:not(:disabled):hover { background: #b07828; transform: translateY(-1px); }

    .card-doremi .btn-start {
      background: var(--teal);
      color: #fff;
    }
    .card-doremi .btn-start:not(:disabled):hover { background: #235f56; transform: translateY(-1px); }

    .btn-stop {
      background: rgba(196,75,46,0.08);
      color: var(--red-soft);
      border: 1.5px solid rgba(196,75,46,0.2);
    }
    .btn-stop:not(:disabled):hover {
      background: rgba(196,75,46,0.14);
      transform: translateY(-1px);
    }

    .btn-reset {
      background: rgba(26,22,16,0.04);
      color: var(--ink-soft);
      border: 1.5px solid rgba(26,22,16,0.1);
    }
    .btn-reset:hover {
      background: rgba(26,22,16,0.08);
      transform: translateY(-1px);
    }

    /* ── FOOTER ── */
    .app-footer {
      margin-top: 20px;
      font-size: 0.7rem;
      color: var(--ink-faint);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      animation: fadeUp 0.6s 0.5s ease both;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    @keyframes pulse-dot {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50%       { transform: scale(1.6); opacity: 1; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="app-header">
    <h1 class="app-title">Luyện <span>Giọng</span></h1>
    <p class="app-subtitle">Nhật ký tập luyện hằng ngày</p>
  </header>

  <!-- LIVE CLOCK -->
  <div class="clock-card">
    <div class="clock-date-line" id="clock-date">---</div>
    <div class="clock-time-line" id="clock-time">00<span class="colon">:</span>00<span class="colon">:</span>00</div>
  </div>

  <!-- SECTION 1: XI BREATHING -->
  <div class="section-card card-xi" id="card-xi">
    <div class="section-head">
      <div class="section-icon">🌬️</div>
      <div>
        <div class="section-name">Xi Breathing</div>
        <div class="section-hint">Hít sâu và xi lâu nhất có thể</div>
      </div>
    </div>
    <div class="timer-wrap">
      <div class="pulse-ring"></div>
      <div class="timer-main" id="xi-display">00:00.00</div>
      <div class="timer-sub" id="xi-sec">0.00 giây</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-start" id="xi-start" onclick="startTimer('xi')">▶ Bắt đầu</button>
      <button class="btn btn-stop"  id="xi-stop"  onclick="stopTimer('xi')"  disabled>■ Dừng</button>
      <button class="btn btn-reset"               onclick="resetTimer('xi')">↺ Reset</button>
    </div>
  </div>

  <!-- SECTION 2: DO RE MI -->
  <div class="section-card card-doremi" id="card-doremi">
    <div class="section-head">
      <div class="section-icon">🎵</div>
      <div>
        <div class="section-name">Do Re Mi</div>
        <div class="section-hint">Do · Re · Mi · Fa · Sol · La · Si · Do</div>
      </div>
    </div>
    <div class="timer-wrap">
      <div class="pulse-ring"></div>
      <div class="timer-main" id="doremi-display">00:00.00</div>
      <div class="timer-sub" id="doremi-sec">0.00 giây</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-start" id="doremi-start" onclick="startTimer('doremi')">▶ Bắt đầu</button>
      <button class="btn btn-stop"  id="doremi-stop"  onclick="stopTimer('doremi')"  disabled>■ Dừng</button>
      <button class="btn btn-reset"                   onclick="resetTimer('doremi')">↺ Reset</button>
    </div>
  </div>

  <div class="app-footer">Nhấn screenshot để lưu kết quả ✦</div>
</div>

<script>
  // ── CLOCK ──
  const DAYS = ['Chủ nhật','Thứ hai','Thứ ba','Thứ tư','Thứ năm','Thứ sáu','Thứ bảy'];

  function updateClock() {
    const now = new Date();
    const day = DAYS[now.getDay()];
    const d = now.getDate(), mo = now.getMonth() + 1, y = now.getFullYear();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('clock-date').textContent =
      `${day}, ngày ${d} tháng ${mo} năm ${y}`;
    document.getElementById('clock-time').innerHTML =
      `${h}<span class="colon">:</span>${m}<span class="colon">:</span>${s}`;
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ── STOPWATCH STATE ──
  const state = {
    xi:     { elapsed: 0, running: false, startAt: null, raf: null },
    doremi: { elapsed: 0, running: false, startAt: null, raf: null },
  };

  function pad(n, l=2) { return String(n).padStart(l, '0'); }

  function formatElapsed(ms) {
    const mins  = Math.floor(ms / 60000);
    const secs  = Math.floor((ms % 60000) / 1000);
    const centis = Math.floor((ms % 1000) / 10);
    return `${pad(mins)}:${pad(secs)}.${pad(centis)}`;
  }

  function renderTimer(id) {
    const s = state[id];
    document.getElementById(`${id}-display`).textContent = formatElapsed(s.elapsed);
    document.getElementById(`${id}-sec`).textContent = (s.elapsed / 1000).toFixed(2) + ' giây';
  }

  function tick(id) {
    const s = state[id];
    if (!s.running) return;
    s.elapsed = Date.now() - s.startAt;
    renderTimer(id);
    s.raf = requestAnimationFrame(() => tick(id));
  }

  function startTimer(id) {
    const s = state[id];
    if (s.running) return;
    s.startAt = Date.now() - s.elapsed;
    s.running = true;
    document.getElementById(`${id}-start`).disabled = true;
    document.getElementById(`${id}-stop`).disabled  = false;
    document.getElementById(`card-${id}`).classList.add('timer-running');
    tick(id);
  }

  function stopTimer(id) {
    const s = state[id];
    if (!s.running) return;
    cancelAnimationFrame(s.raf);
    s.running = false;
    document.getElementById(`${id}-start`).disabled = false;
    document.getElementById(`${id}-stop`).disabled  = true;
    document.getElementById(`card-${id}`).classList.remove('timer-running');
  }

  function resetTimer(id) {
    stopTimer(id);
    state[id].elapsed = 0;
    renderTimer(id);
    document.getElementById(`${id}-start`).disabled = false;
    document.getElementById(`${id}-stop`).disabled  = true;
  }
</script>
</body>
</html>
